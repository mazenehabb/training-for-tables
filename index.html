<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Train for tables</title>
    <style>
      body {
        background-color: antiquewhite;
      }
      td,
      th {
        background-color: #96d4d4;
        border: 3px ridge black;
        /* solid - dotted - dashed - double - groove - ridge - inset - outset - none - hidden */
        /* border-radius: 5px; */
      }
      table {
        border-collapse: collapse;
        /* width: 100%; */
      }
    </style>
  </head>
  <body>
    <h1>Learn Tables Topic</h1>
    <table>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Language</th>
      </tr>
      <tr>
        <td>Mazen</td>
        <td>24</td>
        <td>Python</td>
      </tr>
      <tr>
        <td>Mahmoud</td>
        <td>22</td>
        <td>Html</td>
      </tr>
      <tr>
        <td>Ahmed</td>
        <td>27</td>
        <td>Css</td>
      </tr>
    </table>
  </body>
</html>
